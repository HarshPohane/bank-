<h2 align="center">Open New Bank Account</h2>

<p align="center">Fill the form below to open a new bank account.</p>

<form align="center">

  <label>Full Name:</label><br>
  <input type="text" name="fullname" required><br><br>

  <label>Father's Name:</label><br>
  <input type="text" name="fathername" required><br><br>

  <label>Email:</label><br>
  <input type="email" name="email" required><br><br>

  <label>Mobile Number:</label><br>
  <input type="tel" name="mobile" required><br><br>

  <label>Date of Birth:</label><br>
  <input type="date" name="dob" required><br><br>

  <label>Gender:</label><br>
  <input type="radio" name="gender" value="Male"> Male
  <input type="radio" name="gender" value="Female"> Female
  <input type="radio" name="gender" value="Other"> Other
  <br><br>

  <label>Account Type:</label><br>
  <select name="account">
    <option value="savings">Savings Account</option>
    <option value="current">Current Account</option>
  </select>
  <br><br>

  <label>Aadhar Number:</label><br>
  <input type="text" name="aadhar" required><br><br>

  <label>PAN Number:</label><br>
  <input type="text" name="pan"><br><br>

  <label>Address:</label><br>
  <textarea name="address" rows="4" cols="30" required></textarea>
  <br><br>

  <label>Upload Photo:</label><br>
  <input type="file" name="photo"><br><br>

  <label>Upload Signature:</label><br>
  <input type="file" name="signature"><br><br>

  <input type="submit" value="Submit">
  <input type="reset" value="Clear">

</form>
